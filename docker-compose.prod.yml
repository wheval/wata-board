# Production Docker Compose configuration with SSL/HTTPS
# This file provides a complete production setup with Nginx reverse proxy and SSL termination

version: '3.8'

services:
  # Frontend build service
  frontend-build:
    build:
      context: ./wata-board-frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend_dist:/app/dist
    networks:
      - wata-network
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://api.yourdomain.com
      - VITE_FRONTEND_URL=https://yourdomain.com
      - VITE_NETWORK=testnet
    restart: "no"

  # Backend API service
  backend:
    build:
      context: ./wata-board-dapp
      dockerfile: Dockerfile.prod
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NETWORK=testnet
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - CONTRACT_ID_TESTNET=CDRRJ7IPYDL36YSK5ZQLBG3LICULETIBXX327AGJQNTWXNKY2UMDO4DA
      - CONTRACT_ID_MAINNET=${CONTRACT_ID_MAINNET}
      - RPC_URL_TESTNET=https://soroban-testnet.stellar.org
      - RPC_URL_MAINNET=https://soroban.stellar.org
      - NETWORK_PASSPHRASE_TESTNET=Test SDF Network ; September 2015
      - NETWORK_PASSPHRASE_MAINNET=Public Global Stellar Network ; September 2015
      - ALLOWED_ORIGINS=https://yourdomain.com,https://api.yourdomain.com
      - FRONTEND_URL=https://yourdomain.com
    volumes:
      - ./ssl:/etc/ssl/certs:ro
      - ./logs:/app/logs
    networks:
      - wata-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/letsencrypt:ro
      - frontend_dist:/var/www/wata-board-frontend/dist:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - wata-network
    depends_on:
      - backend
      - frontend-build
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SSL Certificate management with Certbot
  certbot:
    image: certbot/certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      sh -c "while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h;
      done"
    restart: unless-stopped
    networks:
      - wata-network

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - wata-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for monitoring dashboard (optional)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - wata-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  frontend_dist:
  prometheus_data:
  grafana_data:

networks:
  wata-network:
    driver: bridge
